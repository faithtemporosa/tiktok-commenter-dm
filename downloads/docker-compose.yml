version: '3.8'

services:
  # TikTok Account 1
  tiktok-account-1:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    ports:
      - "5555:5555"  # ADB
      - "6080:6080"  # Web UI
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_TIMEOUT=300
      - WEB_VNC=true
    volumes:
      - ./tiktok-data-1:/data
    container_name: tiktok-1
    restart: unless-stopped

  # TikTok Account 2
  tiktok-account-2:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    ports:
      - "5556:5555"  # ADB (different port)
      - "6081:6080"  # Web UI (different port)
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_TIMEOUT=300
      - WEB_VNC=true
    volumes:
      - ./tiktok-data-2:/data
    container_name: tiktok-2
    restart: unless-stopped

  # TikTok Account 3
  tiktok-account-3:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    ports:
      - "5557:5555"  # ADB (different port)
      - "6082:6080"  # Web UI (different port)
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_TIMEOUT=300
      - WEB_VNC=true
    volumes:
      - ./tiktok-data-3:/data
    container_name: tiktok-3
    restart: unless-stopped
